




<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kanban Board</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #f9fafb;
      margin: 0;
      padding: 20px;
      color: #333;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #2d3748;
    }

    /* Form Styling */
    form {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    input, select, button {
      padding: 10px;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid #ddd;
    }

    input, select {
      width: 200px;
    }

    button {
      background: #4f46e5;
      color: white;
      cursor: pointer;
      border: none;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #4338ca;
    }

    /* Board Layout */
    .board {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .column {
      flex: 1;
      min-width: 280px;
      max-width: 320px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      padding: 15px;
      display: flex;
      flex-direction: column;
    }

    .column h2 {
      text-align: center;
      margin: 0 0 10px;
      color: #1a202c;
      font-size: 18px;
    }

    .dropzone {
      flex-grow: 1;
      min-height: 200px;
      background: #f7fafc;
      border-radius: 8px;
      padding: 10px;
      transition: background 0.3s ease;
    }

    .dropzone.dragover {
      background: #e0e7ff;
      border: 2px dashed #4f46e5;
    }

    /* Task Card */
    .task {
      background: white;
      border: 1px solid #e2e8f0;
      border-left: 6px solid #4f46e5;
      margin: 8px 0;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      cursor: grab;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: transform 0.2s ease;
    }

    .task:hover {
      transform: translateY(-2px);
    }

    .task.dragging {
      opacity: 0.6;
      transform: scale(0.95);
    }

    .task button {
      background: #ef4444;
      border: none;
      padding: 5px 8px;
      border-radius: 6px;
      color: white;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .task button:hover {
      background: #dc2626;
    }

    /* Priority Labels */
    .priority {
      font-size: 12px;
      font-weight: bold;
      padding: 2px 6px;
      border-radius: 4px;
      margin-right: 8px;
    }
    .priority.high { background: #fee2e2; color: #b91c1c; }
    .priority.medium { background: #fef3c7; color: #b45309; }
    .priority.low { background: #dcfce7; color: #15803d; }
  </style>
</head>
<body>
  <h1>✨ Modern Kanban Board ✨</h1>

  <form id="taskForm">
    <input id="taskTitle" placeholder="Task title..." required>
    <select id="taskPriority" required>
      <option value="high">High Priority</option>
      <option value="medium">Medium Priority</option>
      <option value="low">Low Priority</option>
    </select>
    <button type="submit">Add Task</button>
  </form>

  <div class="board">
    <div class="column" data-status="todo">
      <h2>📝 To Do</h2>
      <div class="dropzone" id="todo"></div>
    </div>
    <div class="column" data-status="inprogress">
      <h2>🚧 In Progress</h2>
      <div class="dropzone" id="inprogress"></div>
    </div>
    <div class="column" data-status="done">
      <h2>✅ Done</h2>
      <div class="dropzone" id="done"></div>
    </div>
  </div>
  <script type="module" src="./main.js"></script>

  <!-- Keep your same JS code here -->
</body>
</html>
